name: CI

on:
#   pull_request:
#     paths:
#       - 1-DevOps/idempotweet/**
  push:
    branches:
      - main
    # paths:
    #   - 1-DevOps/idempotweet/**
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-DevOps/idempotweet
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enable Corepack
        run: corepack enable
        working-directory: .
      - name: Activate Yarn 4
        run: corepack prepare yarn@4.12.0 --activate
        working-directory: .
      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            1-DevOps/idempotweet/.yarn/cache
            1-DevOps/idempotweet/.yarn/unplugged
          key: ${{ runner.os }}-yarn-${{ hashFiles('1-DevOps/idempotweet/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run tests
        run: yarn test
      - name: Generate test coverage
        run: yarn test:coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 1-DevOps/idempotweet
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
